<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .tile { fill: #0B0F14; }
      .mono { fill: #F2F5F8; font-family: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
      .trace { stroke: #3DF5C5; }
      @media (prefers-color-scheme: light) {
        .tile { fill: #F4F6F9; }
        .mono { fill: #0B0F14; }
        .trace { stroke: #00B488; }
      }
    </style>
  </defs>
  <rect class="tile" x="0" y="0" width="64" height="64" rx="15" />
  <text class="mono" x="32" y="43" font-size="31" letter-spacing="-1.5" text-anchor="middle">TK</text>
  <line class="trace" x1="10" y1="33" x2="54" y2="33" stroke-width="2.4" stroke-linecap="round" />
</svg>
